<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .form-container { max-width: 400px; padding: 20px; border: 1px solid #ccc; }
        input, select, button { display: block; width: 100%; margin-bottom: 10px; padding: 8px; }
    </style>
</head>
<body>
<h2>Editar Produto</h2>
<div class="form-container">
    <form th:action="@{/produtos/editar/{id}(id=${produto.id})}" method="post">
        <label>Nome:</label>
        <input type="text" name="nome" th:value="${produto.nome}" required>

        <label>Preço Base:</label>
        <input type="number" step="0.01" name="precoBase" th:value="${produto.precoBase}" required>

        <label>Categoria:</label>
        <select name="categoria">
            <option value="ELETRONICO" th:selected="${produto.categoria.name() == 'ELETRONICO'}">Eletrônico</option>
            <option value="VESTUARIO" th:selected="${produto.categoria.name() == 'VESTUARIO'}">Vestuário</option>
            <option value="ALIMENTACAO" th:selected="${produto.categoria.name() == 'ALIMENTACAO'}">Alimentação</option>
        </select>

        <button type="submit">Atualizar Produto</button>
    </form>
    <a th:href="@{/produtos}">Cancelar</a>
</div>
</body>
</html>
