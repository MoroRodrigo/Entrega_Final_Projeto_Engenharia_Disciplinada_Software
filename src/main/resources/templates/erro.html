<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ops! Algo deu errado</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 { color: #dc3545; font-size: 2rem; margin-bottom: 1rem; }
        p { font-size: 1.1rem; line-height: 1.6; }
        .btn-voltar {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .btn-voltar:hover { background-color: #0056b3; }
    </style>
</head>
<body>
<div class="error-container">
    <h1>Ocorreu um Erro</h1>
    <p th:text="${erroMensagem}">Mensagem de erro genérica.</p>

    <p>Por favor, tente novamente ou entre em contato com o suporte se o problema persistir.</p>

    <a th:href="@{/produtos}" class="btn-voltar">Voltar para a Lista</a>
</div>
</body>
</html>
